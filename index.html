<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Email</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 100px; padding: 20px; }
        .email-btn { 
            display: inline-block; 
            background-color: #2ea44f; 
            color: white; 
            padding: 15px 30px; 
            font-size: 18px; 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: bold; 
        }
        .email-btn:hover { background-color: #2c974b; }
        p { color: #555; max-width: 400px; margin: 20px auto; line-height: 1.5; }
    </style>
</head>
<body>

    <h2>Ready to Send Your Message?</h2>
    <p>Clicking the button below will open your email app with the recipient, CC, subject line, and draft message already filled out for you.</p>

    <!-- The custom mailto link handles everything in one click -->
    <a class="email-btn" href="mailto:primary-recipient@://example.com">
        Open Email Draft
    </a>

</body>
</html>
